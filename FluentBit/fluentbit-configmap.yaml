apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info
        Daemon       off
        Parsers_File parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

    [INPUT]
        Name             tail
        Tag              kube.*
        Path             /var/log/containers/*.log
        Parser           cri
        DB               /var/fluent-bit/flb_kube.db
        Mem_Buf_Limit    5MB
        Skip_Long_Lines  On
        Refresh_Interval 10

    [FILTER]
        Name             kubernetes
        Match            kube.*
        Kube_URL         https://kubernetes.default.svc:443
        Kube_CA_File     /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File  /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix  kube.var.log.containers.
        Merge_Log        On
        Merge_Log_Key    log
        Keep_Log         On
        Labels           On
        Annotations      On

    [OUTPUT]
        Name               gelf
        Match              *
        Host               graylog-service.logging.svc.cluster.local
        Port               12201
        Mode               udp
        Gelf_Short_Message_Key log
        Gelf_Full_Message_Key  log
        Gelf_Timestamp_Key     time
        Gelf_Host_Key          pod_name

  parsers.conf: |
    [PARSER]
        Name   cri
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
