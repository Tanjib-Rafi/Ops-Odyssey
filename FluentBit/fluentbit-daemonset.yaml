apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.2.3
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: true
        volumeMounts:
          - name: varlog
            mountPath: /var/log
            readOnly: true
          - name: fluent-bit-config
            mountPath: /fluent-bit/etc
          - name: fluent-bit-db
            mountPath: /var/fluent-bit
        env:
          - name: FLUENT_ELASTICSEARCH_HOST
            value: "graylog-service.logging.svc.cluster.local"
      terminationGracePeriodSeconds: 10
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
        - name: fluent-bit-db
          emptyDir: {}

